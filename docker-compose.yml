# Workforce Simulator — docker-compose.yml
#
# Quick start:
#   1. cp .env.example .env           — fill in DEPLOYMENT_KEY (and optionally
#                                        CREDENTIALS_YAML_B64 instead of step 2)
#   2. cp auth/credentials.yaml.example auth/credentials.yaml
#                                     — add users and set cookie key
#   3. docker-compose up --build
#   4. Open http://localhost:8501

version: "3.9"

services:
  workforce-simulator:
    build: .
    container_name: workforce-simulator
    ports:
      - "8501:8501"

    # Secrets and deployment key come from .env (never committed to git)
    env_file:
      - .env

    volumes:
      # Persist simulation state across container restarts
      - ./state:/app/state

      # Persist named config snapshots across container restarts
      - ./configs:/app/configs

      # Mount credentials at runtime — never bake them into the image.
      # For cloud deployments without file mounts, use CREDENTIALS_YAML_B64 in .env
      # and remove (or comment out) this line.
      - ./auth/credentials.yaml:/app/auth/credentials.yaml:ro

    restart: unless-stopped
